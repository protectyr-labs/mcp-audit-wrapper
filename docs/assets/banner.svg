<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="logGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" fill="url(#bg)" rx="6"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#22d3ee" stroke-width="0.5">
    <line x1="0" y1="44" x2="1200" y2="44"/>
    <line x1="0" y1="88" x2="1200" y2="88"/>
    <line x1="0" y1="132" x2="1200" y2="132"/>
    <line x1="0" y1="176" x2="1200" y2="176"/>
  </g>

  <!-- Left side: Title and tagline -->
  <text x="60" y="85" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="38" font-weight="700" fill="#f1f5f9" letter-spacing="-0.5">mcp-audit-wrapper</text>
  <text x="60" y="120" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="0.3">Transparent audit logging for MCP tool calls</text>
  <text x="60" y="150" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13" fill="#64748b" letter-spacing="0.2">Storage-agnostic  /  Zero dependencies  /  Higher-order function pattern</text>

  <!-- Accent line under title -->
  <rect x="60" y="160" width="80" height="2" fill="url(#accent)" rx="1"/>

  <!-- Right side: Flow diagram -->

  <!-- Tool call box -->
  <rect x="680" y="50" width="120" height="50" rx="6" fill="none" stroke="#475569" stroke-width="1.2"/>
  <text x="740" y="72" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="11" fill="#94a3b8" text-anchor="middle">tool_call()</text>
  <text x="740" y="88" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#64748b" text-anchor="middle">params, userId</text>

  <!-- Arrow: tool -> wrapper -->
  <line x1="800" y1="75" x2="840" y2="75" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowGray)"/>
  <defs>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Wrapper box (the invisible wrapper) -->
  <rect x="845" y="35" width="140" height="80" rx="8" fill="url(#logGlow)" stroke="#22d3ee" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.9"/>
  <text x="915" y="60" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="10" fill="#22d3ee" text-anchor="middle" filter="url(#glow)" opacity="0.9">executeWithAudit</text>
  <text x="915" y="78" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">sanitize + log</text>
  <text x="915" y="92" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">+ summarize</text>

  <!-- Arrow: wrapper -> handler -->
  <line x1="985" y1="75" x2="1020" y2="75" stroke="#475569" stroke-width="1.2" marker-end="url(#arrowGray)"/>

  <!-- Handler box (tool unaware) -->
  <rect x="1025" y="50" width="110" height="50" rx="6" fill="none" stroke="#475569" stroke-width="1.2"/>
  <text x="1080" y="72" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="11" fill="#94a3b8" text-anchor="middle">handler()</text>
  <text x="1080" y="88" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#64748b" text-anchor="middle">unmodified</text>

  <!-- Arrow: wrapper -> audit log (downward) -->
  <line x1="915" y1="115" x2="915" y2="145" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrowCyan)" opacity="0.7"/>

  <!-- Audit log -->
  <rect x="855" y="148" width="120" height="36" rx="4" fill="#0f172a" stroke="#22d3ee" stroke-width="0.8" opacity="0.6"/>
  <text x="915" y="164" font-family="'Cascadia Code', 'Fira Code', monospace" font-size="9" fill="#22d3ee" text-anchor="middle" opacity="0.8">audit_log</text>
  <text x="915" y="177" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" fill="#64748b" text-anchor="middle">[REDACTED] safe</text>

  <!-- Bottom accent line -->
  <rect x="0" y="216" width="1200" height="4" fill="url(#accent)" opacity="0.3"/>
</svg>